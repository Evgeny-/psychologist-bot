name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPN server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/cbt-bot
            git pull origin main
            npm install
            npx tsc
            sudo systemctl restart cbt-bot
            sleep 2
            sudo systemctl is-active cbt-bot
