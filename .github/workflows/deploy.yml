name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPN server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            trap 'echo "Deploy failed. Recent service logs:"; sudo journalctl -u cbt-bot.service -n 80 --no-pager || true' ERR

            cd ~/cbt-bot
            git fetch --prune origin main
            git reset --hard origin/main
            git clean -fd
            npm ci
            npm run build
            sudo systemctl restart cbt-bot
            sleep 2
            sudo systemctl is-active --quiet cbt-bot
            git rev-parse --short HEAD
